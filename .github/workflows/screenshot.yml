name: Generate & Deploy Preview Screenshots

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '**/*.kt'
      - '**/*.xml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "preview-screenshots"
  cancel-in-progress: true

jobs:
  capture:
    name: Capture Preview Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Clear previous captures
        run: rm -rf .hotswan/preview-captures

      - name: Run emulator and capture screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            sleep 5
            ./gradlew :app:captureAllPreviews

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-screenshots
          path: .hotswan/preview-captures/
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    needs: capture
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download screenshot artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-screenshots
          path: preview-captures

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: preview-captures

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
